    <h3 style="font-family:'Fraunces',serif; font-weight:400; font-size:24px; margin-bottom:8px;">Cryptopack insights</h3>
    <p class="muted" style="font-size:14px; margin-bottom:24px;">Core logic: <span class="mono" style="background:var(--cream-soft); padding:2px 6px; border-radius:2px;">IF coin_category_concentration > 50% OR feature_match_score > 0.7 → surface matched pack</span></p>

    <div class="insight-grid">
