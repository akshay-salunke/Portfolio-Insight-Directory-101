<!-- SECTION 04: MOENGAGE PLAN -->
<!-- ============================================================ -->
<section class="s" id="moengage">
  <div class="wrap">
    <div class="sec-num">04 — MoEngage execution &amp; tracking plan</div>
    <h2 class="sec">From portfolio signal to <em>booked conversion</em>, in five steps.</h2>
    <p class="sec-intro">A 90-day rollout architecture. Built on MoEngage Segments + Flows + Inline Content (for the home banner) with all events flowing back into our portfolio analytics warehouse for closed-loop attribution.</p>

    <!-- Flow -->
    <div class="flow">
      <div class="flow-step">
        <div class="step-n">STEP 01</div>
        <h5>Compute</h5>
        <p>Nightly batch in our warehouse computes each user's scoring measures, identifies concentration patterns, ranks matching cryptopacks.</p>
      </div>
      <div class="flow-step">
        <div class="step-n">STEP 02</div>
        <h5>Segment</h5>
        <p>MoEngage receives user attributes via API: diversification_score, top_category, idle_balance, days_since_trade, matched_pack_id.</p>
      </div>
      <div class="flow-step">
        <div class="step-n">STEP 03</div>
        <h5>Trigger</h5>
        <p>Flows fire on conditions — e.g., "diversification &lt; 5 AND no campaign in 7 days." Deduplicated across channels.</p>
      </div>
      <div class="flow-step">
        <div class="step-n">STEP 04</div>
        <h5>Deliver</h5>
        <p>Push, in-app banner, email, or WhatsApp — chosen per user's response affinity. CTA deeplinks to pre-filled action screen.</p>
      </div>
      <div class="flow-step">
        <div class="step-n">STEP 05</div>
        <h5>Attribute</h5>
        <p>Conversion event posts back. We measure incremental AUM, not just CTR — control group held out at 10%.</p>
      </div>
    </div>

    <!-- KPI Grid -->
    <div class="panel-title" style="margin-top: 48px;">KPI targets · 90-day cycle</div>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Banner CTR</div>
        <div class="kpi-value">8.4%</div>
        <div class="kpi-delta">+5.2pp vs generic</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">CTA → action conv.</div>
        <div class="kpi-value">22%</div>
        <div class="kpi-delta">target stretch</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Incremental AUM</div>
        <div class="kpi-value">₹2.4 Cr</div>
        <div class="kpi-delta">over 90 days</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">SIP top-ups</div>
        <div class="kpi-value">18%</div>
        <div class="kpi-delta">of campaign base</div>
      </div>
    </div>

    <!-- A/B test framework -->
    <div class="panel-title">A/B test framework</div>
    <div class="grid-3" style="margin-bottom: 36px;">
      <div class="insight-card" style="margin:0;">
        <div class="ic-type">Test 01</div>
        <h4 style="font-size:18px;">Copy specificity</h4>
        <p class="copy" style="font-size:13px;"><strong>A:</strong> "New pack available."<br><strong>B:</strong> "Bluechip pack returned +30%. Add now."<br><strong>C:</strong> "Rajesh, your portfolio matches Bluechip 84%."</p>
      </div>
      <div class="insight-card" style="margin:0;">
        <div class="ic-type">Test 02</div>
        <h4 style="font-size:18px;">Surface placement</h4>
        <p class="copy" style="font-size:13px;"><strong>A:</strong> Home screen banner.<br><strong>B:</strong> Portfolio tab insight card.<br><strong>C:</strong> Push notification only.</p>
      </div>
      <div class="insight-card" style="margin:0;">
        <div class="ic-type">Test 03</div>
        <h4 style="font-size:18px;">CTA framing</h4>
        <p class="copy" style="font-size:13px;"><strong>A:</strong> "Add Pack Now" (action).<br><strong>B:</strong> "See why it fits" (curiosity).<br><strong>C:</strong> "Boost diversification +1.8" (outcome).</p>
      </div>
    </div>

    <!-- Marketing partnership -->
    <div class="callout">
      <div class="eb">Working with marketing</div>
      <h3>Marketing owns the <em>copy and creative</em>. Product owns the <em>signal</em>. Both share the dashboard.</h3>
      <p>Marketing builds the asset library — 3 copy variants and 2 banner designs per insight type — and signs off on tone. Product feeds the segment payload nightly. Both teams co-monitor the conversion funnel in a shared Looker view. Weekly review every Wednesday.</p>
    </div>

    <!-- Event tracking -->
    <div class="panel-title">Events flowing into MoEngage and back to our warehouse</div>
    <table class="tbl">
      <thead>
        <tr>
          <th>Event name</th>
          <th>Triggered by</th>
          <th>Properties captured</th>
          <th>Used for</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="mono" style="font-family:'JetBrains Mono',monospace; font-size:12px;">insight_banner_shown</td>
          <td>Banner renders on home/portfolio</td>
          <td>insight_id, user_id, variant, segment</td>
          <td>Impression baseline, frequency cap</td>
        </tr>
        <tr>
          <td class="mono" style="font-family:'JetBrains Mono',monospace; font-size:12px;">insight_cta_clicked</td>
          <td>User taps the CTA button</td>
          <td>insight_id, user_id, time_to_click</td>
          <td>CTR, variant winner detection</td>
        </tr>
        <tr>
          <td class="mono" style="font-family:'JetBrains Mono',monospace; font-size:12px;">insight_action_completed</td>
          <td>Pack added / SIP boosted / trade placed</td>
          <td>insight_id, action_type, amount</td>
          <td>Conversion rate, incremental AUM</td>
        </tr>
        <tr>
          <td class="mono" style="font-family:'JetBrains Mono',monospace; font-size:12px;">insight_dismissed</td>
          <td>User taps X or scrolls past 3x</td>
          <td>insight_id, dismissal_count</td>
          <td>Fatigue detection, hide threshold</td>
        </tr>
        <tr>
          <td class="mono" style="font-family:'JetBrains Mono',monospace; font-size:12px;">portfolio_score_improved</td>
          <td>Diversification / risk score moved after action</td>
          <td>before, after, attributed_insight</td>
          <td>Closed-loop value attribution</td>
        </tr>
      </tbody>
    </table>

  </div>
</section>

