        <div class="val">₹3.00 Cr volume</div>
      </div>
      <div class="rev-row">
        <div><strong>Retention &amp; reactivation</strong> · 3.5% reduction in dormancy</div>
        <div class="dim mono">3,500 users</div>
        <div class="dim mono">avg ₹5,200</div>
        <div class="val">₹1.82 Cr retained</div>
      </div>
      <div class="rev-row total">
        <div>Estimated 12-month AUM contribution</div>
        <div></div>
        <div></div>
        <div class="val">₹13.81 Cr</div>
      </div>
    </div>

    <p class="muted" style="font-size:13px; margin-top:16px; font-family:'JetBrains Mono', monospace;">Assumes ~1.2% take rate on transaction volume + ~0.6% annualized fee on AUM = ~₹9-12L incremental monthly revenue at maturity. SIP-first new-user line is the most defensible — recurring commits, longer LTV, lower CAC payback than equivalent ad spend.</p>

    <div class="callout" style="margin-top: 64px;">
      <div class="eb">The bigger picture</div>
      <h3>The competitive moat isn't the model — it's the <em>portfolio data flywheel</em> that feeds it.</h3>
      <p>Anyone can buy GPT-4 access. What no competitor has is our two years of behavioral data — which insights converted, which got dismissed, which user types respond to which framing. Each banner shown improves the next one. That's the AUM compounding engine.</p>
    </div>

  </div>
</section>

