<section class="s" id="aistrategy">
  <div class="wrap">
    <div class="sec-num">05 — Beyond banners: AI insights as a moat</div>
    <h2 class="sec">How AI insights compound into <em>engagement, AUM and revenue</em>.</h2>
    <p class="sec-intro">Banners are the surface layer. The deeper play is making AI insights a continuous companion across the app — turning portfolio analytics into an engagement loop that competitors without our data can't replicate.</p>

    <div class="concept-grid">
      <div class="concept">
        <div class="num">01</div>
        <h4>Weekly portfolio health report</h4>
        <p>Every Sunday 9am, every user gets an AI-generated 4-card summary: "Your week," top mover, score delta, one suggested action. Drives session frequency from 2.1 to 3.8 per week (early data).</p>
      </div>
      <div class="concept">
        <div class="num">02</div>
        <h4>Conversational portfolio Q&amp;A</h4>
        <p>"Ask anything about your portfolio." Why am I down this month? What's my best-performing holding? Should I add ETH? Each answer ends with a contextual CTA — softer than banners, higher trust.</p>
      </div>
      <div class="concept">
        <div class="num">03</div>
        <h4>Predictive rebalance alerts</h4>
        <p>"At this trajectory, your BTC will hit 60% concentration in 18 days." Forward-looking, not reactive. Surfaces the action before the user notices the problem.</p>
      </div>
      <div class="concept">
        <div class="num">04</div>
        <h4>Peer benchmarking with humility</h4>
        <p>"Investors with portfolios similar to yours averaged +24% — you did +18%. Here's what they hold that you don't." Comparison framing without shaming. Drives pack discovery.</p>
      </div>
      <div class="concept">
        <div class="num">05</div>
        <h4>Goal companion</h4>
        <p>User sets a goal (₹10L by 2027). AI tracks the gap weekly, nudges SIP up when behind, celebrates milestones. Turns one-time signup into 36-month retention.</p>
      </div>
      <div class="concept">
        <div class="num">06</div>
        <h4>Market-event narrator</h4>
        <p>When BTC moves > 5%, every user gets an AI-personalized "Here's what this means for your portfolio." Not just news — translated to their holdings. Engagement on volatility days +180%.</p>
      </div>
    </div>

    <!-- Revenue model -->
    <div class="panel-title">Modeled revenue impact · 12 months · base of 100,000 active users</div>
    <div class="rev-model">
      <div class="rev-row">
