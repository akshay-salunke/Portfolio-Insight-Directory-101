<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Insights & Engagement Strategy — Crypto Investment App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --cream: #F7F4ED;
    --cream-soft: #FDFCF8;
    --ink: #1A1814;
    --ink-soft: #5A554A;
    --ink-mute: #8A8472;
    --line: #E5DFD2;
    --line-soft: #EFEADD;
    --rust: #B4421A;
    --rust-soft: #FCE7DA;
    --green: #14532D;
    --green-soft: #DCFCE7;
    --red: #991B1B;
    --red-soft: #FEE2E2;
    --gold: #92400E;
    --gold-soft: #FEF3C7;
    --indigo: #312E81;
    --indigo-soft: #E0E7FF;
    --teal: #115E59;
    --teal-soft: #CCFBF1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter Tight', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 48px; }
  .serif { font-family: 'Fraunces', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .muted { color: var(--ink-soft); }
  .dim { color: var(--ink-mute); }

  /* HERO */
  header.hero {
    border-bottom: 1px solid var(--line);
    padding: 80px 0 64px;
    background: linear-gradient(180deg, var(--cream-soft) 0%, var(--cream) 100%);
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 24px;
  }
  h1.title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 68px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    max-width: 900px;
    margin-bottom: 28px;
  }
  h1.title em { font-style: italic; font-weight: 400; color: var(--rust); }
  .lede {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink-soft);
    max-width: 720px;
    margin-bottom: 48px;
  }
  .meta-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    border-top: 1px solid var(--line);
    padding-top: 32px;
  }
  .meta-row .cell .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 8px;
  }
  .meta-row .cell .v {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 400;
  }

  /* SECTION */
  section.s {
    padding: 96px 0;
    border-bottom: 1px solid var(--line);
  }
  section.s:last-child { border-bottom: none; }
  .sec-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--rust);
    margin-bottom: 16px;
  }
  h2.sec {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 44px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    max-width: 800px;
    margin-bottom: 20px;
  }
  h2.sec em { font-style: italic; color: var(--rust); }
  .sec-intro {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 680px;
    margin-bottom: 56px;
  }

  /* PROFILE CARDS */
  .profile {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 48px;
  }
  .profile-head {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 32px 36px;
    border-bottom: 1px solid var(--line);
    background: var(--cream-soft);
  }
  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--rust);
    color: var(--cream-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 400;
  }
  .avatar.green { background: var(--green); }
  .avatar.indigo { background: var(--indigo); }
  .avatar.teal { background: var(--teal); }
  .avatar.gold { background: var(--gold); }
  .profile-name h3 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 30px;
    letter-spacing: -0.015em;
    margin-bottom: 4px;
  }
  .profile-name .meta { font-size: 13px; color: var(--ink-soft); }
  .profile-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 2px;
    background: var(--rust-soft);
    color: var(--rust);
  }
  .profile-tag.green { background: var(--green-soft); color: var(--green); }

  .profile-body { padding: 36px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line-soft);
  }

  /* METRIC CARDS */
  .metric {
    background: var(--cream);
    border-radius: 4px;
    padding: 18px 20px;
  }
  .metric .label {
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .metric .value {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .metric .sub { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
  .metric .value.green { color: var(--green); }
  .metric .value.red { color: var(--red); }

  /* SCORE BARS */
  .scores { display: flex; flex-direction: column; gap: 14px; }
  .score-row {
    display: grid;
    grid-template-columns: 140px 1fr 50px;
    align-items: center;
    gap: 16px;
  }
  .score-row .lbl { font-size: 13px; color: var(--ink); }
  .score-bar {
    height: 6px;
    background: var(--line-soft);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .score-bar .fill {
    height: 100%;
    background: var(--ink);
    border-radius: 3px;
  }
  .score-bar .fill.rust { background: var(--rust); }
  .score-bar .fill.green { background: var(--green); }
  .score-bar .fill.gold { background: var(--gold); }
  .score-bar .fill.red { background: var(--red); }
  .score-row .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    text-align: right;
  }

  /* HEALTH SCORE CARD */
  .health-card {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    background: var(--cream);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .health-card .hs-left {
    padding: 28px 32px;
    border-right: 1px solid var(--line);
    background: var(--cream-soft);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .health-card .hs-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 14px;
  }
  .health-card .hs-number {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 14px;
    line-height: 1;
  }
  .health-card .hs-number .big {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 72px;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .health-card .hs-number .denom {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--ink-mute);
  }
  .health-card .hs-status {
    display: inline-block;
    align-self: flex-start;
    padding: 4px 12px;
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .health-card .hs-status.good { background: var(--green-soft); color: var(--green); }
  .health-card .hs-status.fair { background: var(--gold-soft); color: var(--gold); }
  .health-card .hs-status.poor { background: var(--red-soft); color: var(--red); }
  .health-card .hs-blurb {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.45;
    max-width: 280px;
  }
  .health-card .hs-right {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* COIN BARS (horizontal stacked) */
  .stack-bar {
    display: flex;
    height: 32px;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .stack-bar > span {
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 11px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }
  .legend {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 16px;
  }
  .legend .leg-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .legend .swatch {
    width: 10px; height: 10px; border-radius: 2px;
  }
  .legend .lname { flex: 1; }
  .legend .lval { font-family: 'JetBrains Mono', monospace; color: var(--ink-soft); }

  /* CHARTS */
  .chart-wrap {
    position: relative;
    width: 100%;
    background: var(--cream);
    border-radius: 4px;
    padding: 20px;
  }
  .chart-wrap.tall { height: 280px; }
  .chart-wrap.short { height: 220px; }
  .chart-wrap canvas { display: block; }

  /* INSIGHT CARDS */
  .insight-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 48px;
  }
  .insight-card {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
    position: relative;
  }
  .insight-card .ic-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 14px;
  }
  .insight-card .ic-type.green { color: var(--green); }
  .insight-card .ic-type.indigo { color: var(--indigo); }
  .insight-card h4 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  .insight-card .trigger {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--cream);
    border-left: 2px solid var(--rust);
    font-family: 'JetBrains Mono', monospace;
  }
  .insight-card .trigger.green { border-left-color: var(--green); }
  .insight-card .trigger.indigo { border-left-color: var(--indigo); }
  .insight-card p.copy {
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 16px;
  }
  .insight-card .cta {
    display: inline-block;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--cream-soft);
    background: var(--ink);
    padding: 10px 18px;
    border-radius: 2px;
    letter-spacing: 0.01em;
  }
  .insight-card .cta.rust { background: var(--rust); }
  .insight-card .cta.green { background: var(--green); }

  /* MOENGAGE TABLE */
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    background: var(--cream-soft);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--line);
    font-size: 13px;
  }
  table.tbl th {
    background: var(--cream);
    text-align: left;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 500;
    border-bottom: 1px solid var(--line);
  }
  table.tbl td {
    padding: 16px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  table.tbl tr:last-child td { border-bottom: none; }
  table.tbl td.user { font-family: 'Fraunces', serif; font-size: 16px; }
  table.tbl td .pv { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 2px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--rust-soft);
    color: var(--rust);
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .pill.green { background: var(--green-soft); color: var(--green); }
  .pill.indigo { background: var(--indigo-soft); color: var(--indigo); }
  .pill.gold { background: var(--gold-soft); color: var(--gold); }
  .pill.teal { background: var(--teal-soft); color: var(--teal); }

  /* FLOW DIAGRAM */
  .flow {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  .flow-step {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 18px;
    position: relative;
  }
  .flow-step .step-n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--rust);
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .flow-step h5 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 16px;
    margin-bottom: 8px;
    line-height: 1.25;
  }
  .flow-step p { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }
  .kpi {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
  }
  .kpi .kpi-label {
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .kpi .kpi-value {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
  }
  .kpi .kpi-delta { font-size: 12px; color: var(--green); font-family: 'JetBrains Mono', monospace; }
  .kpi .kpi-delta.red { color: var(--red); }

  /* CALLOUT */
  .callout {
    background: var(--ink);
    color: var(--cream-soft);
    border-radius: 4px;
    padding: 48px;
    margin: 48px 0;
  }
  .callout .eb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #E9A671;
    margin-bottom: 20px;
  }
  .callout h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 32px;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    max-width: 700px;
  }
  .callout h3 em { color: #E9A671; font-style: italic; }
  .callout p {
    color: #C9C0AE;
    max-width: 700px;
    font-size: 15px;
  }

  /* RECOMMENDATIONS FOR PROFILE */
  .recs {
    margin-top: 32px;
    background: var(--cream);
    border-radius: 4px;
    padding: 28px;
  }
  .recs h5 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 18px;
  }
  .recs .rec-item {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .recs .rec-item:last-child { border-bottom: none; }
  .recs .rec-item .ico {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--rust);
    color: var(--cream-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
  }
  .recs .rec-item .ico.green { background: var(--green); }
  .recs .rec-item .ico.indigo { background: var(--indigo); }
  .recs .rec-item .body { font-size: 14px; }
  .recs .rec-item .body strong { font-weight: 500; }
  .recs .rec-item .micro { font-size: 11px; color: var(--ink-mute); font-family: 'JetBrains Mono', monospace; }

  /* TOC */
  nav.toc {
    position: sticky;
    top: 0;
    background: rgba(247, 244, 237, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 16px 0;
    z-index: 100;
  }
  nav.toc .toc-inner {
    display: flex;
    gap: 32px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  nav.toc a { color: var(--ink-soft); text-decoration: none; white-space: nowrap; transition: color 0.2s; }
  nav.toc a:hover { color: var(--rust); }

  /* TWO-COL TEXT */
  .two-col-text {
    columns: 2;
    column-gap: 48px;
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 32px;
  }
  .two-col-text p { margin-bottom: 16px; break-inside: avoid; }

  /* CONCEPT GRID for final section */
  .concept-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 48px;
  }
  .concept {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
  }
  .concept .num {
    font-family: 'Fraunces', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--rust);
    line-height: 1;
    margin-bottom: 16px;
  }
  .concept h4 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 20px;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .concept p { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

  /* REVENUE MODEL */
  .rev-model {
    background: var(--cream-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 36px;
  }
  .rev-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 20px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--line-soft);
    font-size: 14px;
  }
  .rev-row:last-child { border-bottom: none; padding-top: 20px; font-family: 'Fraunces', serif; font-size: 18px; }
  .rev-row .val { font-family: 'JetBrains Mono', monospace; text-align: right; min-width: 100px; }
  .rev-row.total .val { font-family: 'Fraunces', serif; font-size: 20px; color: var(--green); }

  footer {
    padding: 64px 0;
    text-align: center;
    background: var(--ink);
    color: var(--ink-mute);
  }
  footer p { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

  @media (max-width: 900px) {
    .wrap { padding: 0 24px; }
    h1.title { font-size: 44px; }
    h2.sec { font-size: 32px; }
    .grid-2, .grid-3, .grid-4, .insight-grid, .concept-grid { grid-template-columns: 1fr; }
    .meta-row, .kpi-grid { grid-template-columns: 1fr 1fr; }
    .flow { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="eyebrow">Product Strategy · Q2 2026 · Marketing & Growth</div>
